
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример с HTML и JavaScript</title>
    <script>
        function greetUser() {
            const name = document.getElementById("nameInput").value;
            const output = document.getElementById("output");
            output.innerHTML = `Привет, ${name}!`;
        }
    </script>
</head>
<body>

**Введите ваше имя:**
<input type="text" id="nameInput" placeholder="Ваше имя">
<button onclick="greetUser()">Отправить</button>
<p id="output"></p>

</body>
</html>
